# Stack de operación y monitoreo del servicio de churn (Proyecto Final).
# Levanta 3 servicios: la API, Prometheus (recolección de métricas) y Grafana (visualización).
services:
  churn-api:
    build: .
    image: churn-api-oporto
    container_name: churn-api-oporto
    ports:
      - "8005:8000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-oporto
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    depends_on:
      - churn-api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-oporto
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
