name: CI

# Ejecuta las pruebas automáticas en cada push y en cada Pull Request,
# garantizando que la API sigue funcionando antes de integrar cambios (ML-Ops: automatización).
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas (pytest)
        run: pytest -q
